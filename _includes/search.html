<form id="search-form" action="/search/">
  <label class="form-label visually-hidden" for="search-input">Search</label>
  <div class="input-group input-group-lg">
    <input
      name="search"
      type="text"
      class="form-control shadow"
      placeholder="Search"
      id="search-input"
      autocomplete="off">
    <button type="submit" class="btn btn-primary">Go</button>
  </div>
</form>
